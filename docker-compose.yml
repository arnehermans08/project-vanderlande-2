services:
  mongodb:
    image: mongo:4.4.18
    container_name: vanderlande-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - ./mongo/data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=dbVdl

  api-be:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: vanderlande-api-be
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/dbVdl
      - PORT=8080
    volumes:
      - ./backend:/app/backend
    working_dir: /app/backend
    command: sh -c "npm install && node API-BE"
    depends_on:
      - mongodb

  api-fe:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: vanderlande-api-fe
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - API_BE_URL=http://api-be:8080
      - PORT=5000
    volumes:
      - ./frontend:/app/frontend
    working_dir: /app/frontend
    command: sh -c "npm install && node API-FE"
    depends_on:
      - api-be

  webserver:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: vanderlande-webserver
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    volumes:
      - ./frontend/public:/app/frontend/public
      - ./server.js:/app/server.js
    working_dir: /app
    command: sh -c "npm install && node server.js"
    depends_on:
      - api-fe